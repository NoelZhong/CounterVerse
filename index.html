<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CounterVerse v4.0</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- GAME CANVAS -->
    <canvas id="gameCanvas"></canvas>

    <!-- =========================
         START SCREEN
    ========================== -->

    <div id="startScreen">

        <div class="startCard">

            <h1>🚀 CounterVerse</h1>

            <h2>Version 4.0 — Foundation</h2>

            <p>
                Explore a living universe powered by the Gravity Core.
            </p>

            <button id="playButton">
                🚀 PLAY
            </button>

            <button id="multiplayerButton">
                🌌 MULTIPLAYER
            </button>

            <button id="settingsButton">
                ⚙ SETTINGS
            </button>

            <div class="comingSoon">
                Multiplayer Coming Soon
            </div>

        </div>

    </div>


    <!-- =========================
         TOP BAR
    ========================== -->

    <header id="topBar">

        <div id="logo">

            🚀 CounterVerse

        </div>

        <button id="openSettings">

            ⚙

        </button>

    </header>



    <!-- =========================
         LEFT HUD
    ========================== -->

    <aside id="leftHUD">

        <div class="hudCard">

            ⭐ Score

            <span id="score">0</span>

        </div>

        <div class="hudCard">

            🏆 Best

            <span id="best">0</span>

        </div>

        <div class="hudCard">

            🔥 Combo

            <span id="combo">x1</span>

        </div>

    </aside>



    <!-- =========================
         CENTER PANEL
    ========================== -->

    <section id="counterPanel">

        <h2>COUNTER CORE</h2>

        <div id="counterValue">

            0

        </div>

        <div id="stabilityBar">

            <div id="stabilityFill"></div>

        </div>

        <div id="stabilityText">

            Stable

        </div>

        <div class="counterButtons">

            <button id="minus">−</button>

            <button id="plus">+</button>

        </div>

    </section>



    <!-- =========================
         RIGHT PANEL
    ========================== -->

    <aside id="rightHUD">

        <button id="boom">

            💥 BOOM

        </button>

        <button id="sweep">

            🧹 SWEEP

        </button>

        <button id="pause">

            ⏸ PAUSE

        </button>

        <button id="settings">

            ⚙ SETTINGS

        </button>

    </aside>



    <!-- =========================
         MOBILE CONTROLS
    ========================== -->

    <div id="mobileControls">

        <button id="left">

            ◀

        </button>

        <button id="thrust">

            🚀

        </button>

        <button id="right">

            ▶

        </button>

        <button id="brake">

            ⏹

        </button>

    </div>



    <script src="script.js"></script>

</body>
</html>
