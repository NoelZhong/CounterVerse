<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CounterVerse</title>

</head>


<body>


<!-- GAME CANVAS -->

<canvas id="game"></canvas>




<! START SCREEN>
<div id="startScreen">


    <div class="startCard">


        <h1>🚀 CounterVerse</h1>

<div id="version">
    v3.1 — Gravity Core Update
</div>


<p id="loadingText">
    Initializing universe...
</p>


        <p>
            Explore a universe powered by a living gravity core.
        </p>


        <button id="startButton">
            🚀 Launch
        </button>


        <button id="multiplayerButton">
            🌐 Multiplayer
        </button>
        <div id="multiplayerNotice">
    🌐 Multiplayer systems are coming soon...
</div>

    </div>


</div>







<!-- SCORE -->

<div id="hud">


    ⭐ Score:
    <span id="score">0</span>


    <br>


    🏆 Best:
    <span id="best">0</span>


    <br>


    🔥 Combo:
    <span id="combo">x1</span>


</div>








<!-- COUNTER -->

<div id="counterPanel">


    <h2>
        COUNTER
    </h2>


    <div id="count">
        0
    </div>



    <div class="counterButtons">


        <button id="minus">
            -
        </button>


        <button id="plus">
            +
        </button>


    </div>


</div>







<!-- CORE INFO -->

<div id="coreInfo">


    🌌 Core:
    <span id="coreValue">
        0
    </span>


</div>







<!-- GAME BUTTONS -->

<div id="tools">


    <button id="boom">
        💥 BOOM
    </button>


    <button id="clean">
        🧹 CLEAN
    </button>


    <button id="pause">
        ⏸ PAUSE
    </button>


</div>








<!-- MOBILE CONTROLS -->

<div id="mobileControls">


    <button id="left">
        ◀
    </button>


    <button id="thrust">
        🚀
    </button>


    <button id="right">
        ▶
    </button>


    <button id="brake">
        ⏹
    </button>


</div>







</body>

</html>
